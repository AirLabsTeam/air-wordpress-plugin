name: Release Plugin Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [development, qa, production]
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build assets (APP_ENV=${{ matrix.env }})
        run: APP_ENV=${{ matrix.env }} yarn build

      - name: Create plugin zip (folder name == zip basename)
        run: |
          set -euo pipefail
          SLUG="air-picker-${{ matrix.env }}"
          yarn plugin-zip
          unzip -q air-wordpress-plugin.zip -d _stage
          mv _stage/air-wordpress-plugin "_stage/${SLUG}"
          (cd _stage && zip -rq "../${SLUG}.zip" "${SLUG}")
          rm -rf air-wordpress-plugin.zip _stage

      - uses: actions/upload-artifact@v4
        with:
          name: air-picker-${{ matrix.env }}
          path: air-picker-${{ matrix.env }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
