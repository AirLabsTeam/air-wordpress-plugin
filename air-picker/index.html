<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air — Asset Picker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Screens ─────────────────────────────────────────────────────────── */
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }

        /* ── Auth screen ─────────────────────────────────────────────────────── */
        #screen-auth {
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .auth-card {
            width: 100%;
            max-width: 340px;
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1a1a1a;
        }

        .auth-heading {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .auth-sub {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .auth-fields { display: flex; flex-direction: column; gap: 10px; }

        .auth-fields label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #444;
        }

        .auth-fields input {
            padding: 9px 12px;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        .auth-fields input:focus { border-color: #1a1a1a; }

        #auth-error {
            font-size: 12px;
            color: #c0392b;
            display: none;
        }

        .btn-primary {
            padding: 10px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
            width: 100%;
        }
        .btn-primary:hover { opacity: 0.85; }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: #bbb;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .btn-secondary {
            padding: 9px;
            background: #fff;
            color: #333;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:hover { border-color: #999; }

        /* ── Gallery screen ──────────────────────────────────────────────────── */
        header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-logo { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; flex-shrink: 0; }

        #search {
            flex: 1;
            padding: 7px 12px;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background: #fafafa;
            transition: border-color 0.15s;
        }
        #search:focus { border-color: #1a1a1a; background: #fff; }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        #user-email { font-size: 11px; color: #888; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #sign-out-btn {
            font-size: 11px;
            color: #888;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }
        #sign-out-btn:hover { color: #c0392b; background: #fdf0f0; }

        #filter-bar {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .filter-btn {
            padding: 4px 12px;
            border: 1px solid #d1d1d1;
            border-radius: 20px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            color: #555;
        }
        .filter-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }
        .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

        #gallery {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            align-content: start;
        }

        .asset-card {
            background: #fff;
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
            position: relative;
        }
        .asset-card:hover { border-color: #1a1a1a; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .asset-card.selected { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(0,0,0,0.12); }

        .asset-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: #eee;
        }

        .asset-card .check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        .asset-card.selected .check { display: flex; }

        .asset-info { padding: 8px; }
        .asset-name {
            font-size: 11px;
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .asset-type { font-size: 10px; color: #888; margin-top: 2px; text-transform: uppercase; }

        #empty {
            display: none;
            grid-column: 1 / -1;
            text-align: center;
            color: #888;
            font-size: 13px;
            padding: 40px 0;
        }

        footer {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #selection-label { font-size: 12px; color: #666; }

        #insert-btn {
            padding: 8px 18px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        #insert-btn:hover:not(:disabled) { opacity: 0.8; }
        #insert-btn:disabled { background: #ccc; cursor: default; }
    </style>
</head>
<body>

<!-- ── Screen 1: Auth ──────────────────────────────────────────────────────── -->
<div id="screen-auth" class="screen">
    <div class="auth-card">
        <div class="auth-logo">Air</div>

        <div>
            <div class="auth-heading">Sign in to your account</div>
            <div class="auth-sub">Access your Air workspace assets</div>
        </div>

        <div class="auth-fields">
            <label>
                Email
                <input id="auth-email" type="email" placeholder="you@company.com" autocomplete="email" />
            </label>
            <label>
                Password
                <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password" />
            </label>
        </div>

        <div id="auth-error"></div>

        <button class="btn-primary" id="sign-in-btn">Sign in</button>

        <div class="auth-divider">or</div>

        <button class="btn-secondary" id="google-btn">
            <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
        </button>
    </div>
</div>

<!-- ── Screen 2: Gallery ────────────────────────────────────────────────────── -->
<div id="screen-gallery" class="screen">
    <header>
        <span class="header-logo">Air</span>
        <input id="search" type="search" placeholder="Search assets…" autocomplete="off" />
        <div class="user-badge">
            <span id="user-email"></span>
            <button id="sign-out-btn" title="Sign out">Sign out</button>
        </div>
    </header>

    <div id="filter-bar">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="image">Images</button>
        <button class="filter-btn" data-type="video">Video</button>
        <button class="filter-btn" data-type="document">Documents</button>
    </div>

    <div id="gallery">
        <div id="empty">No assets match your search.</div>
    </div>

    <footer>
        <span id="selection-label">No asset selected</span>
        <button id="insert-btn" disabled>Insert</button>
    </footer>
</div>

<script>
    // ── Sample assets — swap for real Air API calls when available ────────────
    const ASSETS = [
        { id: 1,  name: "Hero Banner",      type: "image",    url: "https://picsum.photos/seed/air1/400/400", caption: "Hero banner image" },
        { id: 2,  name: "Product Shot A",   type: "image",    url: "https://picsum.photos/seed/air2/400/400", caption: "Product shot A" },
        { id: 3,  name: "Product Shot B",   type: "image",    url: "https://picsum.photos/seed/air3/400/400", caption: "Product shot B" },
        { id: 4,  name: "Team Photo",       type: "image",    url: "https://picsum.photos/seed/air4/400/400", caption: "Team photo" },
        { id: 5,  name: "Brand Logo",       type: "image",    url: "https://picsum.photos/seed/air5/400/400", caption: "Brand logo" },
        { id: 6,  name: "Campaign Visual",  type: "image",    url: "https://picsum.photos/seed/air6/400/400", caption: "Campaign visual" },
        { id: 7,  name: "Lifestyle Shot",   type: "image",    url: "https://picsum.photos/seed/air7/400/400", caption: "Lifestyle shot" },
        { id: 8,  name: "Event Recap",      type: "image",    url: "https://picsum.photos/seed/air8/400/400", caption: "Event recap photo" },
        { id: 9,  name: "Product Video",    type: "video",    url: "https://example.com/video.mp4",           caption: "Product video" },
        { id: 10, name: "Brand Guidelines", type: "document", url: "https://example.com/guidelines.pdf",      caption: "Brand guidelines PDF" },
        { id: 11, name: "Q1 Lookbook",      type: "document", url: "https://example.com/lookbook.pdf",        caption: "Q1 lookbook" },
        { id: 12, name: "Promo Reel",       type: "video",    url: "https://example.com/promo.mp4",           caption: "Promo reel" },
    ];

    const SESSION_KEY = 'air_mock_session';

    // ── Auth helpers ──────────────────────────────────────────────────────────
    function getSession() {
        try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
    }
    function saveSession(email) { localStorage.setItem(SESSION_KEY, JSON.stringify({ email })); }
    function clearSession()     { localStorage.removeItem(SESSION_KEY); }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ── Auth screen ───────────────────────────────────────────────────────────
    function initAuth() {
        const emailInput    = document.getElementById('auth-email');
        const passwordInput = document.getElementById('auth-password');
        const errorEl       = document.getElementById('auth-error');

        function trySignIn() {
            const email    = emailInput.value.trim();
            const password = passwordInput.value;
            errorEl.style.display = 'none';
            if (!email || !password) {
                errorEl.textContent   = 'Please enter your email and password.';
                errorEl.style.display = 'block';
                return;
            }
            // Mock: accept any non-empty credentials
            saveSession(email);
            initGallery(email);
            showScreen('screen-gallery');
        }

        document.getElementById('sign-in-btn').addEventListener('click', trySignIn);
        passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') trySignIn(); });

        document.getElementById('google-btn').addEventListener('click', () => {
            // Mock Google OAuth — skip credentials, accept immediately
            const mockEmail = 'user@gmail.com';
            saveSession(mockEmail);
            initGallery(mockEmail);
            showScreen('screen-gallery');
        });
    }

    // ── Gallery screen ────────────────────────────────────────────────────────
    let selectedAsset = null;
    let activeFilter  = 'all';
    let galleryReady  = false;

    function initGallery(email) {
        if (galleryReady) {
            document.getElementById('user-email').textContent = email;
            return;
        }
        galleryReady = true;

        document.getElementById('user-email').textContent = email;

        document.getElementById('sign-out-btn').addEventListener('click', () => {
            clearSession();
            selectedAsset = null;
            activeFilter  = 'all';
            galleryReady  = false;
            showScreen('screen-auth');
        });

        document.getElementById('filter-bar').addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.type;
            renderGallery();
        });

        document.getElementById('search').addEventListener('input', renderGallery);

        document.getElementById('insert-btn').addEventListener('click', () => {
            if (!selectedAsset) return;
            const payload = {
                url:            selectedAsset.url,
                caption:        selectedAsset.caption,
                other_metadata: { type: selectedAsset.type, name: selectedAsset.name },
            };
            console.log('Sending asset to WordPress:', payload);
            window.parent.postMessage(JSON.stringify(payload), '*');
        });

        renderGallery();
    }

    function renderGallery() {
        const query   = document.getElementById('search').value.trim().toLowerCase();
        const gallery = document.getElementById('gallery');
        const insertBtn      = document.getElementById('insert-btn');
        const selectionLabel = document.getElementById('selection-label');

        const visible = ASSETS.filter(a => {
            const matchType   = activeFilter === 'all' || a.type === activeFilter;
            const matchSearch = !query || a.name.toLowerCase().includes(query);
            return matchType && matchSearch;
        });

        gallery.querySelectorAll('.asset-card').forEach(el => el.remove());
        document.getElementById('empty').style.display = visible.length === 0 ? 'block' : 'none';

        visible.forEach(asset => {
            const card  = document.createElement('div');
            card.className = 'asset-card' + (selectedAsset?.id === asset.id ? ' selected' : '');

            const thumb = asset.type === 'image'
                ? `<img src="${asset.url}" alt="${asset.name}" loading="lazy" />`
                : `<div style="width:100%;aspect-ratio:1;background:#eee;display:flex;align-items:center;justify-content:center;font-size:32px;">${asset.type === 'video' ? '🎬' : '📄'}</div>`;

            card.innerHTML = `${thumb}<div class="check">✓</div>
                <div class="asset-info">
                    <div class="asset-name" title="${asset.name}">${asset.name}</div>
                    <div class="asset-type">${asset.type}</div>
                </div>`;

            card.addEventListener('click', () => {
                selectedAsset = asset;
                selectionLabel.textContent = `Selected: ${asset.name}`;
                insertBtn.disabled = false;
                renderGallery();
            });

            gallery.appendChild(card);
        });
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    initAuth();
    const session = getSession();
    if (session?.email) {
        initGallery(session.email);
        showScreen('screen-gallery');
    } else {
        showScreen('screen-auth');
    }
</script>
</body>
</html>
